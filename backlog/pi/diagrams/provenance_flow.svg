<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="pf-title pf-desc">
  <title id="pf-title">PI Agent — Provenance: Page to Fact to Token to Letter</title>
  <desc id="pf-desc">Left-to-right provenance chain: a DocumentPage is extracted by Sonnet into a typed fact, stored in the versioned fact registry, tokenized into a Brain-2 prompt, drafted with FACT/AMT/CITE/EX tokens, detokenized by the deterministic renderer into a letter with no tokens on the wire, and surfaced in a provenance viewer that round-trips back to the source page.</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1400" height="640" fill="#FFFFFF"/>
  <rect x="4" y="4" width="1392" height="632" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Shared arrowhead marker -->
  <defs>
    <marker id="pf-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Title / subtitle -->
  <text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Provenance: Page → Fact → Token → Letter</text>
  <text x="36" y="76" font-size="13" fill="#64748B">Every fact in the demand resolves to a source page; orphan tokens never reach the wire.</text>

  <!-- Legend (top-right) -->
  <g font-size="12" fill="#475569">
    <rect x="1074" y="34" width="14" height="14" rx="3" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="1094" y="45">data store</text>
    <rect x="1180" y="34" width="14" height="14" rx="3" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="1200" y="45">LLM stage</text>
    <rect x="1288" y="34" width="14" height="14" rx="3" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="1308" y="45">deterministic</text>
    <rect x="1074" y="56" width="14" height="14" rx="3" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
    <text x="1094" y="67">frontend / deliverable</text>
    <rect x="1224" y="56" width="14" height="14" rx="3" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
    <text x="1244" y="67">neutral</text>
  </g>

  <!-- ============================ ROW 1 ============================ -->

  <!-- DocumentPage (data store cylinder) -->
  <g>
    <path d="M 44 176 L 44 232 A 92 12 0 0 0 228 232 L 228 176" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <ellipse cx="136" cy="176" rx="92" ry="12" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="136" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#075985">DocumentPage</text>
    <text x="136" y="209" text-anchor="middle" font-size="12" fill="#475569">text + image</text>
    <text x="136" y="225" text-anchor="middle" font-size="12" fill="#475569">+ confidence</text>
  </g>

  <!-- Extractor (LLM) -->
  <g>
    <rect x="308" y="164" width="176" height="80" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="396" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="#5B21B6">Extractor</text>
    <text x="396" y="221" text-anchor="middle" font-size="12" fill="#475569">Sonnet</text>
  </g>

  <!-- Typed fact (neutral) -->
  <g>
    <rect x="564" y="156" width="196" height="96" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
    <text x="662" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">Typed fact</text>
    <text x="662" y="210" text-anchor="middle" font-size="12" fill="#475569">kind, value, anchors,</text>
    <text x="662" y="226" text-anchor="middle" font-size="12" fill="#475569">confidence</text>
  </g>

  <!-- Fact registry (data store cylinder, hub) -->
  <g>
    <path d="M 840 172 L 840 236 A 96 12 0 0 0 1032 236 L 1032 172" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <ellipse cx="936" cy="172" rx="96" ry="12" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="936" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#075985">Fact registry</text>
    <text x="936" y="208" text-anchor="middle" font-size="12" fill="#475569">matter state,</text>
    <text x="936" y="224" text-anchor="middle" font-size="12" fill="#475569">versioned</text>
  </g>

  <!-- Row 1 arrows -->
  <line x1="228" y1="204" x2="304" y2="204" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <line x1="484" y1="204" x2="560" y2="204" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <line x1="760" y1="204" x2="836" y2="204" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>

  <!-- Registry -> Brain-2 prompt (down into row 2) -->
  <path d="M 936 248 L 936 312 L 372 312 L 372 336" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>

  <!-- ============================ ROW 2 ============================ -->

  <!-- Brain-2 prompt (LLM) -->
  <g>
    <rect x="284" y="348" width="196" height="90" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="382" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#5B21B6">Brain-2 prompt</text>
    <text x="382" y="402" text-anchor="middle" font-size="12" fill="#475569">tokens + display</text>
    <text x="382" y="418" text-anchor="middle" font-size="12" fill="#475569">forms only</text>
  </g>

  <!-- Draft with tokens (neutral) -->
  <g>
    <rect x="540" y="348" width="212" height="90" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
    <text x="646" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">Tokenized draft</text>
    <text x="646" y="402" text-anchor="middle" font-size="12" fill="#475569">FACT, AMT, CITE,</text>
    <text x="646" y="418" text-anchor="middle" font-size="12" fill="#475569">EX tokens</text>
  </g>

  <!-- Deterministic renderer (green) -->
  <g>
    <rect x="812" y="348" width="196" height="90" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="910" y="389" text-anchor="middle" font-size="15" font-weight="600" fill="#166534">Deterministic</text>
    <text x="910" y="410" text-anchor="middle" font-size="15" font-weight="600" fill="#166534">renderer</text>
  </g>

  <!-- Rendered letter (rose deliverable) -->
  <g>
    <rect x="1068" y="348" width="288" height="90" rx="10" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
    <text x="1212" y="380" text-anchor="middle" font-size="15" font-weight="600" fill="#9F1239">Rendered letter</text>
    <text x="1212" y="402" text-anchor="middle" font-size="12" fill="#475569">no tokens on the wire</text>
  </g>

  <!-- Provenance viewer (rose frontend) -->
  <g>
    <rect x="1068" y="470" width="288" height="98" rx="10" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
    <text x="1212" y="502" text-anchor="middle" font-size="15" font-weight="600" fill="#9F1239">Provenance viewer</text>
    <text x="1212" y="524" text-anchor="middle" font-size="12" fill="#475569">click fact, open source</text>
    <text x="1212" y="540" text-anchor="middle" font-size="12" fill="#475569">page highlight</text>
  </g>

  <!-- Row 2 arrows -->
  <line x1="480" y1="393" x2="536" y2="393" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <line x1="752" y1="393" x2="808" y2="393" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <line x1="1008" y1="393" x2="1064" y2="393" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <!-- Rendered letter -> Provenance viewer -->
  <line x1="1212" y1="438" x2="1212" y2="466" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>

  <!-- Extra arrow: Fact registry -> Deterministic renderer (resolve) -->
  <path d="M 910 248 L 910 344" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <rect x="880" y="322" width="60" height="18" fill="#FFFFFF" opacity="0.92"/>
  <text x="910" y="335" text-anchor="middle" font-size="12" fill="#475569">resolve</text>

  <!-- Extra arrow: Fact registry -> Provenance viewer (anchors, via right gutter) -->
  <path d="M 1032 190 L 1378 190 L 1378 519 L 1360 519" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#pf-arrow)"/>
  <rect x="1170" y="172" width="60" height="18" fill="#FFFFFF" opacity="0.92"/>
  <text x="1200" y="185" text-anchor="middle" font-size="12" fill="#475569">anchors</text>

  <!-- Dashed round-trip return: Provenance viewer -> DocumentPage along bottom -->
  <path d="M 1068 555 L 136 555 L 136 244" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#pf-arrow)"/>
  <rect x="470" y="546" width="270" height="18" fill="#FFFFFF" opacity="0.92"/>
  <text x="605" y="559" text-anchor="middle" font-size="12" fill="#475569">round-trip: fact → source page</text>

  <!-- ============================ TOKEN LEGEND STRIP ============================ -->
  <text x="44" y="484" font-size="13" letter-spacing="1" fill="#64748B">TOKEN NAMESPACES</text>
  <g font-size="12">
    <!-- FACT -->
    <rect x="44" y="498" width="118" height="26" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
    <text x="103" y="515" text-anchor="middle" fill="#0F172A">[[FACT_n]]</text>
    <text x="44" y="542" fill="#475569">medical / incident facts</text>

    <!-- AMT -->
    <rect x="240" y="498" width="118" height="26" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
    <text x="299" y="515" text-anchor="middle" fill="#0F172A">[[AMT_n]]</text>
    <text x="240" y="542" fill="#475569">dollar figures from ledger</text>

    <!-- CITE -->
    <rect x="470" y="498" width="118" height="26" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
    <text x="529" y="515" text-anchor="middle" fill="#0F172A">[[CITE_n]]</text>
    <text x="470" y="542" fill="#475569">legal authority</text>

    <!-- EX -->
    <rect x="640" y="498" width="118" height="26" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
    <text x="699" y="515" text-anchor="middle" fill="#0F172A">[[EX_n]]</text>
    <text x="640" y="542" fill="#475569">exhibit references</text>
  </g>
</svg>
