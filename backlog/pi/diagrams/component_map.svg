<text x="672" y="533" font-size="12" fill="#0284C7" text-anchor="middle">THE SPINE — one per-matter token</text>
<text x="672" y="550" font-size="12" fill="#0284C7" text-anchor="middle">namespace; typed, anchored, versioned</text>
</g>

<!-- brain2_drafting (LLM, left) -->
