<text x="922" y="485" font-size="12" fill="#475569" text-anchor="middle">G3 panel: det. checks +</text>
<text x="922" y="501" font-size="12" fill="#475569" text-anchor="middle">semantic judge + buckets</text>
</g>

<!-- package_builder (deterministic green, right side / artifacts) -->
<g>
<rect x="1064" y="440" width="216" height="70" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="1172" y="466" font-size="15" font-weight="600" fill="#166534" text-anchor="middle">package_builder</text>
<text x="1172" y="485" font-size="12" fill="#475569" text-anchor="middle">detokenized letter.docx +</text>
<text x="1172" y="501" font-size="12" fill="#475569" text-anchor="middle">Bates exhibit binder.pdf</text>
</g>

