<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 940" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="cm-title cm-desc">
<title id="cm-title">PI Agent — Component Map</title>
<desc id="cm-desc">Layered component architecture: frontend workbench over the API/wire boundary, an orchestrator gate machine coordinating an engine layer whose hub is the versioned fact registry (data spine), fed by a corpus ingest-then-extraction pipeline, money engine, and jurisdiction rules, all riding a platform-core substrate; the package builder assembles the deliverable. Edges are labeled with what crosses each boundary; color encodes component kind.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="1400" height="940" fill="#FFFFFF"/>
<rect x="4" y="4" width="1392" height="932" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

<text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Component Map</text>
<text x="36" y="76" font-size="13" fill="#64748B">Layered components around the versioned fact registry; edges labeled with what crosses each boundary.</text>

<!-- ===== Legend (top-right) ===== -->
<g font-size="12">
<rect x="978" y="30" width="392" height="62" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
<rect x="992" y="42" width="13" height="13" rx="3" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<text x="1012" y="52" fill="#475569">LLM-touching</text>
<rect x="1112" y="42" width="13" height="13" rx="3" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="1132" y="52" fill="#475569">Deterministic</text>
<rect x="1238" y="42" width="13" height="13" rx="3" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="1258" y="52" fill="#475569">Data spine</text>
<rect x="992" y="66" width="13" height="13" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="1012" y="76" fill="#475569">HITL gates</text>
<rect x="1112" y="66" width="13" height="13" rx="3" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
<text x="1132" y="76" fill="#475569">Frontend</text>
<rect x="1238" y="66" width="13" height="13" rx="3" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="1258" y="76" fill="#475569">Neutral / substrate</text>
</g>

<!-- ===== LAYER: FRONTEND ===== -->
<text x="44" y="122" font-size="13" fill="#64748B" letter-spacing="1">PRESENTATION</text>
<g>
<rect x="44" y="132" width="1140" height="56" rx="10" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
<text x="66" y="157" font-size="15" font-weight="600" fill="#9F1239">frontend_workbench</text>
<text x="66" y="176" font-size="12" fill="#475569">Gate UIs · chronology grid · provenance viewer — displays state, never invents it (frontend/)</text>
</g>

<!-- ===== LAYER: API / WIRE ===== -->
<text x="44" y="220" font-size="13" fill="#64748B" letter-spacing="1">WIRE BOUNDARY</text>
<g>
<rect x="44" y="230" width="1140" height="56" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="66" y="255" font-size="15" font-weight="600" fill="#0F172A">api_and_wire</text>
<text x="66" y="274" font-size="12" fill="#475569">REST + SSE fronting everything · view-models only, no overlay echo · a leaf (app/api)</text>
</g>

<!-- ===== LAYER: ORCHESTRATION ===== -->
<text x="44" y="320" font-size="13" fill="#64748B" letter-spacing="1">COORDINATION</text>
<g>
<rect x="44" y="330" width="1140" height="56" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="66" y="355" font-size="15" font-weight="600" fill="#92400E">orchestrator_gates</text>
<text x="66" y="374" font-size="12" fill="#92400E">Gate state machine (G1→G3) + run coordination across engine components (app/engine/orchestrator)</text>
</g>

<!-- ===== LAYER: ENGINE ===== -->
<text x="44" y="420" font-size="13" fill="#64748B" letter-spacing="1">ENGINE</text>

<!-- fact_registry: CENTER HUB (data-store cylinder, emphasized) -->
