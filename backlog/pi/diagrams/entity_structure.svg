<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">PI Agent — Entity Structure (Adopted)</title>
<desc id="d">Adopted entity structure. Seed investors invest into PI Agent NewCo, a Delaware C-corp that owns software, IP, and brand. NewCo connects to the AZ ABS PI firm, licensed by the Arizona Supreme Court, through two channels: an arm's-length software license at fair market value and an ABS equity stake. The firm returns distributions to NewCo. Bao, an attorney co-owner, and the AZ PI managing attorney plus compliance lawyer hold equity in the firm. AZ injury clients pay contingency fees to the firm.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M1 1L9 5L1 9" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="1400" height="640" fill="#FFFFFF"/>
<rect x="4" y="4" width="1392" height="632" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

<text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Entity Structure (Adopted)</text>
<text x="36" y="76" font-size="13" fill="#64748B">Delaware C-corp raises; Arizona ABS firm practices; economics via equity, not fee conduits.</text>

<!-- ============ LEGEND (top-right) ============ -->
<g font-size="12">
<rect x="1058" y="34" width="12" height="12" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<text x="1076" y="44" fill="#475569">Tech co (NewCo)</text>
<rect x="1058" y="56" width="12" height="12" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="1076" y="66" fill="#475569">Firm / attorneys</text>
<rect x="1214" y="34" width="12" height="12" rx="2" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="1232" y="44" fill="#475569">External party</text>
</g>

<!-- ============ Bao (amber) top ============ -->
<g>
<rect x="516" y="120" width="220" height="60" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="626" y="146" font-size="15" font-weight="600" fill="#92400E" text-anchor="middle">Bao</text>
<text x="626" y="166" font-size="12" fill="#475569" text-anchor="middle">attorney co-owner</text>
</g>

<!-- ============ AZ managing attorney (amber) top ============ -->
<g>
<rect x="792" y="120" width="264" height="60" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="924" y="146" font-size="15" font-weight="600" fill="#92400E" text-anchor="middle">AZ PI managing attorney</text>
<text x="924" y="166" font-size="12" fill="#475569" text-anchor="middle">+ compliance lawyer</text>
</g>

<!-- Bao -> FIRM (equity) : down then elbow into firm top edge at x=860 -->
<path d="M626 180 L626 260 L860 260 L860 296" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="591" y="211" width="70" height="18" rx="4" fill="#FFFFFF"/>
<text x="626" y="224" font-size="12" fill="#475569" text-anchor="middle">equity</text>

<!-- AZ attorney -> FIRM (equity + employment) : straight down into firm top edge -->
<path d="M924 180 L924 296" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="854" y="229" width="140" height="18" rx="4" fill="#FFFFFF"/>
<text x="924" y="242" font-size="12" fill="#475569" text-anchor="middle">equity + employment</text>

<!-- ============ Seed investors (neutral) left ============ -->
<g>
<rect x="52" y="300" width="180" height="72" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="142" y="342" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">Seed investors</text>
</g>

<!-- Seed -> NewCo (invest) -->
<path d="M232 336 L294 336" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="230" y="309" width="66" height="18" rx="4" fill="#FFFFFF"/>
<text x="263" y="322" font-size="12" fill="#475569" text-anchor="middle">invest</text>

<!-- ============ NewCo (purple) center-left ============ -->
<g>
<rect x="296" y="296" width="298" height="112" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<text x="445" y="344" font-size="15" font-weight="600" fill="#5B21B6" text-anchor="middle">PI Agent NewCo — Delaware C-corp</text>
<text x="445" y="368" font-size="12" fill="#475569" text-anchor="middle">software, IP, brand</text>
</g>

<!-- ============ FIRM (amber) center-right ============ -->
<g>
<rect x="790" y="296" width="298" height="112" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="939" y="344" font-size="15" font-weight="600" fill="#92400E" text-anchor="middle">AZ ABS PI firm</text>
<text x="939" y="368" font-size="12" fill="#475569" text-anchor="middle">licensed by AZ Supreme Court</text>
</g>

<!-- NewCo -> FIRM : software license at FMV (upper) -->
<path d="M594 324 L790 324" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="600" y="298" width="186" height="18" rx="4" fill="#FFFFFF"/>
<text x="693" y="311" font-size="12" fill="#475569" text-anchor="middle">arm's-length license at FMV</text>
<rect x="628" y="316" width="130" height="16" fill="#FFFFFF"/>
<text x="693" y="328" font-size="11" fill="#94A3B8" text-anchor="middle">(flat + per-matter)</text>

<!-- NewCo -> FIRM : ABS equity stake (middle) -->
<path d="M594 356 L790 356" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="620" y="347" width="144" height="18" rx="4" fill="#FFFFFF"/>
<text x="692" y="360" font-size="12" fill="#475569" text-anchor="middle">ABS equity stake</text>

<!-- FIRM -> NewCo : distributions (lower, return) -->
<path d="M790 388 L594 388" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="638" y="379" width="108" height="18" rx="4" fill="#FFFFFF"/>
<text x="692" y="392" font-size="12" fill="#475569" text-anchor="middle">distributions</text>

<!-- ============ AZ injury clients (neutral) bottom-left ============ -->
<g>
<rect x="586" y="500" width="200" height="72" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
<text x="686" y="542" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">AZ injury clients</text>
</g>

<!-- clients -> FIRM (contingency fees) : up into firm bottom edge -->
<path d="M786 536 L900 536 L900 408" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="820" y="470" width="128" height="18" rx="4" fill="#FFFFFF"/>
<text x="884" y="483" font-size="12" fill="#475569" text-anchor="middle">contingency fees</text>

<!-- ============ footnote ============ -->
<text x="36" y="600" font-size="12" fill="#94A3B8">Profits reach NewCo as distributions on ABS equity — the clean channel — not as inflated license fees.</text>

</svg>
