<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="ds-title ds-desc">
  <title id="ds-title">PI Agent — Demand Generation (SSE Sequence)</title>
  <desc id="ds-desc">UML sequence diagram across six lifelines — Attorney frontend, FastAPI, Orchestrator, Brain-2 Opus, Fact registry, and Judge Sonnet. The attorney posts a generate request; the orchestrator loads the approved registry version, gets a strategy memo from Brain-2, then loops per planned section drafting tokens-only sections and streaming SSE previews, runs a judge semantic pre-check, and streams a G3 gate-ready payload back to the attorney.</desc>

  <!-- Canvas -->
  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <rect x="4" y="4" width="1392" height="892" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Shared arrowhead marker -->
  <defs>
    <marker id="ds-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Title / subtitle -->
  <text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Demand Generation (SSE Sequence)</text>
  <text x="36" y="76" font-size="13" fill="#64748B">Brain-2 drafts tokens-only sections; the judge pre-checks; G3 gets the payload.</text>

  <!-- Legend (top-right) -->
  <g font-size="12" fill="#475569">
    <rect x="836" y="40" width="14" height="14" rx="3" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
    <text x="856" y="51">frontend</text>
    <rect x="928" y="40" width="14" height="14" rx="3" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
    <text x="948" y="51">neutral service</text>
    <rect x="1068" y="40" width="14" height="14" rx="3" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="1088" y="51">LLM stage</text>
    <rect x="1178" y="40" width="14" height="14" rx="3" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="1198" y="51">data store</text>
  </g>

  <!-- ============================ LIFELINES ============================ -->
  <!-- Vertical dashed lifelines (drawn first so header boxes overlay the top) -->
  <line x1="130"  y1="150" x2="130"  y2="826" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <line x1="340"  y1="150" x2="340"  y2="826" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <line x1="560"  y1="150" x2="560"  y2="826" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <line x1="800"  y1="150" x2="800"  y2="810" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <line x1="1040" y1="150" x2="1040" y2="810" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 5"/>
  <line x1="1270" y1="150" x2="1270" y2="810" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 5"/>

  <!-- Header boxes -->
  <!-- 1 Attorney (rose) -->
  <rect x="46" y="104" width="168" height="46" rx="10" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
  <text x="130" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#9F1239">Attorney</text>
  <text x="130" y="142" text-anchor="middle" font-size="11" fill="#475569">frontend</text>
  <!-- 2 FastAPI (neutral) -->
  <rect x="266" y="104" width="148" height="46" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="340" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#0F172A">FastAPI</text>
  <!-- 3 Orchestrator (neutral) -->
  <rect x="480" y="104" width="160" height="46" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="560" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#0F172A">Orchestrator</text>
  <!-- 4 Brain-2 (LLM) -->
  <rect x="716" y="104" width="168" height="46" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="800" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#5B21B6">Brain-2</text>
  <text x="800" y="142" text-anchor="middle" font-size="11" fill="#475569">Opus</text>
  <!-- 5 Fact registry (data store) -->
  <rect x="956" y="104" width="168" height="46" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
  <text x="1040" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#075985">Fact registry</text>
  <!-- 6 Judge (LLM) -->
  <rect x="1186" y="104" width="168" height="46" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1270" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#5B21B6">Judge</text>
  <text x="1270" y="142" text-anchor="middle" font-size="11" fill="#475569">Sonnet</text>

  <!-- ============================ LOOP FRAME (behind activation bars) ============================ -->
  <!-- spans lifelines 2 (FastAPI, x=340) .. 5 (Fact registry, x=1040) -->
  <rect x="300" y="462" width="792" height="216" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.3"/>
  <path d="M 300 462 L 300 486 L 500 486 L 500 476 L 490 462 Z" fill="#FEF3C7" stroke="#D97706" stroke-width="1.3"/>
  <text x="312" y="480" font-size="12" font-weight="600" fill="#92400E">loop — per planned section</text>

  <!-- ============================ ACTIVATION BARS ============================ -->
  <!-- Thin activation bars while a participant is active -->
  <!-- FastAPI active: msg1 .. end -->
  <rect x="334" y="200" width="12" height="626" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <!-- Orchestrator active: msg2 .. msg12 -->
  <rect x="554" y="252" width="12" height="542" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <!-- Brain-2 active: memo call (msg4-5) -->
  <rect x="794" y="356" width="12" height="52" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <!-- Brain-2 active: section draft (msg6-7) -->
  <rect x="794" y="488" width="12" height="52" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <!-- Fact registry active: load (msg3) -->
  <rect x="1034" y="304" width="12" height="30" fill="#BAE6FD" stroke="#0284C7" stroke-width="1"/>
  <!-- Judge active: pre-check (msg10-11) -->
  <rect x="1264" y="712" width="12" height="52" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>

  <!-- ============================ MESSAGES ============================ -->
  <g>
    <!-- 1  Attorney -> FastAPI (call) -->
    <line x1="130" y1="200" x2="332" y2="200" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="150" y="180" width="286" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="152" y="193" font-size="12" fill="#475569">1  POST /matters/id/demand/generate</text>

    <!-- 2  FastAPI -> Orchestrator (call) -->
    <line x1="346" y1="252" x2="552" y2="252" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="360" y="232" width="220" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="362" y="245" font-size="12" fill="#475569">2  start run, open SSE channel</text>

    <!-- 3  Orchestrator -> Fact registry (call) -->
    <line x1="566" y1="304" x2="1032" y2="304" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="580" y="284" width="452" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="582" y="297" font-size="12" fill="#475569">3  load approved facts, amounts, exhibits, cites (registry version from G2.5)</text>

    <!-- 4  Orchestrator -> Brain-2 (call) -->
    <line x1="566" y1="356" x2="792" y2="356" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="580" y="336" width="470" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="582" y="349" font-size="12" fill="#475569">4  strategy memo (StrategyPlan + G1.5 inputs + registry display forms)</text>

    <!-- 5  Brain-2 --> Orchestrator (return) -->
    <line x1="794" y1="408" x2="568" y2="408" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ds-arrow)"/>
    <rect x="660" y="388" width="70" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="662" y="401" font-size="12" fill="#475569">5  memo</text>

    <!-- ===== inside loop ===== -->
    <!-- 6  Orchestrator -> Brain-2 (call) -->
    <line x1="566" y1="510" x2="792" y2="510" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="574" y="490" width="240" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="576" y="503" font-size="12" fill="#475569">6  draft section (tokens only,</text>
    <rect x="574" y="514" width="240" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="576" y="527" font-size="12" fill="#475569">    late-bound hard constraints)</text>

    <!-- 7  Brain-2 --> Orchestrator (return) -->
    <line x1="794" y1="556" x2="568" y2="556" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ds-arrow)"/>
    <rect x="620" y="536" width="150" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="622" y="549" font-size="12" fill="#475569">7  tokenized section</text>

    <!-- 8  Orchestrator self-message -->
    <path d="M 566 592 L 636 592 L 636 616 L 568 616" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="644" y="596" width="300" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="646" y="609" font-size="12" fill="#475569">8  validate: tokens resolve, constraints hold</text>

    <!-- 9  Orchestrator --> FastAPI (return, SSE) -->
    <line x1="554" y1="652" x2="348" y2="652" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ds-arrow)"/>
    <rect x="360" y="632" width="270" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="362" y="645" font-size="12" fill="#475569">9  SSE section event (rendered preview)</text>
    <!-- ===== end loop ===== -->

    <!-- 10  Orchestrator -> Judge (call) -->
    <line x1="566" y1="712" x2="1262" y2="712" stroke="#334155" stroke-width="2" marker-end="url(#ds-arrow)"/>
    <rect x="580" y="692" width="280" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="582" y="705" font-size="12" fill="#475569">10  semantic compliance pre-check</text>

    <!-- 11  Judge --> Orchestrator (return) -->
    <line x1="1264" y1="764" x2="568" y2="764" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ds-arrow)"/>
    <rect x="700" y="744" width="360" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="702" y="757" font-size="12" fill="#475569">11  findings (mechanical vs semantic buckets)</text>

    <!-- 12  Orchestrator --> FastAPI (return, SSE) -->
    <line x1="554" y1="794" x2="348" y2="794" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ds-arrow)"/>
    <rect x="360" y="774" width="230" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="362" y="787" font-size="12" fill="#475569">12  SSE gate_ready (G3 payload)</text>

    <!-- 13  FastAPI --> Attorney (return) -->
    <line x1="334" y1="826" x2="132" y2="826" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ds-arrow)"/>
    <rect x="150" y="806" width="190" height="16" fill="#FFFFFF" opacity="0.9"/>
    <text x="152" y="819" font-size="12" fill="#475569">13  G3 compliance review</text>
  </g>
</svg>
