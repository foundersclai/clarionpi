<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 830" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="fs-title fs-desc">
<title id="fs-title">PI Agent — Strategy Intake to Evidence Confirm (G1 → G2a)</title>
<desc id="fs-desc">UML sequence across eight lifelines — Attorney, Paralegal, FastAPI, Orchestrator, chronology_builder, money_engine, risk_flag_engine, and fact_registry. The attorney approves G1 (pinning the rule-pack) and submits verbatim StrategyInputs at G1.5; a parallel Brain-1 analysis block builds the chronology, materializes the specials ledger, and runs risk detectors; G2a opens for paralegal prep and attorney confirm, which — once high-severity flags are dispositioned — freezes the fact registry and pins its version. A dashed rework back-edge shows picks changed re-running analysis.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
</marker>
<marker id="arrowr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#B45309"/>
</marker>
</defs>

<rect x="0" y="0" width="1400" height="830" fill="#FFFFFF"/>
<rect x="4" y="4" width="1392" height="822" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

<text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Strategy Intake to Evidence Confirm (G1 → G2a)</text>
<text x="36" y="76" font-size="13" fill="#64748B">G1 approve pins the rule-pack; verbatim G1.5 inputs launch analysis; G2a confirm freezes the registry.</text>

