<text x="238" y="574">10 · ledger correction → writes BillingLine (recompute)</text>
<text x="238" y="590">11 · exhibit picker include/exclude (page-level)</text>
<text x="238" y="606">12 · risk-flag disposition PREP (attorney owns final)</text>
</g>
