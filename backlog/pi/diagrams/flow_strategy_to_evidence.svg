<!-- par branch 2: ledger -->
<line x1="646" y1="392" x2="982" y2="392" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="650" y="374" width="330" height="16" fill="#F6FBF6"/>
