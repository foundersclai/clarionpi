<rect x="650" y="430" width="470" height="16" fill="#F6FBF6"/>
<text x="652" y="442" font-size="11.5" fill="#475569">7  run detectors: gaps, priors, degenerative, causation → RiskFlag[]</text>

<!-- 8 OR --> API gate_ready evidence_review -->
<line x1="634" y1="500" x2="476" y2="500" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="478" y="482" width="330" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="480" y="494" font-size="12" fill="#475569">8  all stages done → SSE gate_ready {gate: evidence_review}</text>
</g>

