<!-- ============================ MESSAGES ============================ -->
<g>
<!-- 1 AT -> API G1 approve -->
<line x1="130" y1="188" x2="468" y2="188" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="150" y="170" width="320" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="152" y="182" font-size="12" fill="#475569">1  POST /gates/facts_review/submit {approve, deadline_confirmations}</text>

<!-- 2 API -> OR G1 approve (role guard) -->
<line x1="474" y1="220" x2="632" y2="220" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="478" y="202" width="330" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="480" y="214" font-size="12" fill="#475569">2  G1 approve (role: attorney) → GateRecord; PIN rule-pack; → strategy_intake</text>

<!-- 3 AT -> API G1.5 verbatim inputs -->
<line x1="130" y1="252" x2="632" y2="252" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="150" y="234" width="420" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="152" y="246" font-size="12" fill="#475569">3  POST /gates/strategy_intake/submit {liability_theory, injury_framing, anchor_amount...}</text>

<!-- 4 OR self: store verbatim + budget precheck + transition -->
<path d="M646 284 L716 284 L716 296 L648 296" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="724" y="276" width="440" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="726" y="288" font-size="12" fill="#475569">4  store StrategyInputs VERBATIM · budget precheck · → analysis_running</text>

<!-- par branch 1: chronology -->
<line x1="646" y1="340" x2="812" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="650" y="322" width="340" height="16" fill="#F6FBF6"/>
