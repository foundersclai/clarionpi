<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 742" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img">
<title>PI Agent — Gate State Machine (G1 → G3)</title>
<desc>Serpentine state machine: from start through corpus_processing, facts_review (G1), strategy_intake (G1.5), analysis_running, evidence_review (G2a), plan_review (G2.5), drafting, compliance_review (G3), package_assembly, package_ready, to end. Attorney and paralegal gates are highlighted; dashed rework arrows show loops back to earlier states.</desc>
