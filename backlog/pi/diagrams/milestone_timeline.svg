<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">PI Agent — MVP Milestones (Weeks 1–16)</title>
<desc id="d">A gantt-style timeline over 16 weeks with swimlanes: Foundations (M0), Corpus (M1, M2), HITL (M3, M4), Drafting (M5, M6), and Quality (M7). Above the lanes, spikes S1 OCR bake-off, S2 extraction fidelity, S3 pilot firm commitment, and S4 BAA paperwork run as de-risking tracks. M8 v1.x fast-follows begin post-MVP.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

