<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 756" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="756" fill="#FFFFFF"/>
  <rect x="4" y="4" width="1392" height="748" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — system context</text>
  <text x="36" y="76" font-size="13" fill="#64748B">Who touches the system, what flows in, what comes out</text>

  <!-- ===== Legend (top-right) ===== -->
  <g>
    <rect x="1086" y="30" width="278" height="132" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="1100" y="44" width="16" height="16" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="1124" y="56" font-size="12" fill="#475569">HITL — human</text>
    <rect x="1100" y="68" width="16" height="16" rx="4" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="1124" y="80" font-size="12" fill="#475569">LLM stage</text>
    <rect x="1100" y="92" width="16" height="16" rx="4" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="1124" y="104" font-size="12" fill="#475569">Deterministic code</text>
    <rect x="1100" y="116" width="16" height="16" rx="4" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="1124" y="128" font-size="12" fill="#475569">Data store</text>
    <rect x="1100" y="140" width="16" height="16" rx="4" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
    <text x="1124" y="152" font-size="12" fill="#475569">Frontend / deliverable</text>
    <rect x="1247" y="44" width="16" height="16" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="1271" y="56" font-size="12" fill="#475569">External — BAA</text>
  </g>

  <!-- ================= LEFT COLUMN ================= -->
  <!-- PI Firm container -->
  <rect x="48" y="140" width="316" height="196" rx="12" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="66" y="166" font-size="13" fill="#64748B" letter-spacing="1" font-weight="600">PI FIRM</text>

  <!-- Paralegal (HITL) -->
  <rect x="66" y="182" width="280" height="60" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="80" y="209" font-size="15" font-weight="600" fill="#92400E">Paralegal</text>
  <text x="80" y="228" font-size="12" fill="#475569">Prep</text>

  <!-- Attorney (HITL) -->
  <rect x="66" y="256" width="280" height="66" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="80" y="281" font-size="15" font-weight="600" fill="#92400E">Attorney</text>
  <text x="80" y="300" font-size="12" fill="#475569">Strategy and sign-off</text>

  <!-- Case file (document stack, neutral) -->
  <rect x="62" y="392" width="296" height="96" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <rect x="54" y="384" width="296" height="96" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <rect x="48" y="378" width="296" height="96" rx="10" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="64" y="406" font-size="15" font-weight="600" fill="#0F172A">Case file</text>
  <text x="64" y="426" font-size="12" fill="#475569">Medical records, bills,</text>
  <text x="64" y="443" font-size="12" fill="#475569">police report, wage docs,</text>
  <text x="64" y="460" font-size="12" fill="#475569">photos</text>

  <!-- ================= CENTER: PI AGENT ================= -->
  <rect x="452" y="120" width="520" height="600" rx="14" fill="#FDFEFF" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="472" y="147" font-size="13" fill="#64748B" letter-spacing="1" font-weight="600">PI AGENT</text>

  <!-- Next.js app (frontend rose) -->
  <rect x="472" y="162" width="480" height="62" rx="10" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
  <text x="488" y="187" font-size="15" font-weight="600" fill="#9F1239">Next.js app</text>
  <text x="488" y="207" font-size="12" fill="#475569">Gates, chronology, provenance viewer</text>

  <!-- FastAPI (neutral) -->
  <rect x="472" y="240" width="480" height="62" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="488" y="265" font-size="15" font-weight="600" fill="#0F172A">FastAPI</text>
  <text x="488" y="285" font-size="12" fill="#475569">REST + SSE, view-models</text>

  <!-- Orchestrator (neutral) -->
  <rect x="472" y="318" width="480" height="52" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <text x="488" y="350" font-size="15" font-weight="600" fill="#0F172A">Orchestrator + gate machine</text>

  <!-- Document workers (LLM purple) -->
  <rect x="472" y="386" width="234" height="62" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="488" y="411" font-size="15" font-weight="600" fill="#5B21B6">Document workers</text>
  <text x="488" y="431" font-size="12" fill="#475569">Classify, OCR, extract</text>

  <!-- Deterministic core (green) -->
  <rect x="718" y="380" width="234" height="76" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="734" y="405" font-size="15" font-weight="600" fill="#166534">Deterministic core</text>
  <text x="734" y="425" font-size="12" fill="#475569">Specials, dates, renderer,</text>
  <text x="734" y="442" font-size="12" fill="#475569">package builder</text>

  <!-- Postgres + pgvector (data store cylinder) -->
  <g>
    <path d="M472 512 v70 a114 13 0 0 0 228 0 v-70" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <ellipse cx="586" cy="512" rx="114" ry="13" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="586" y="548" font-size="15" font-weight="600" fill="#075985" text-anchor="middle">Postgres + pgvector</text>
  </g>

  <!-- Object store (data store cylinder) -->
  <g>
    <path d="M718 512 v70 a114 13 0 0 0 228 0 v-70" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <ellipse cx="832" cy="512" rx="114" ry="13" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
    <text x="832" y="542" font-size="15" font-weight="600" fill="#075985" text-anchor="middle">Object store</text>
    <text x="832" y="561" font-size="12" fill="#475569" text-anchor="middle">Documents, artifacts</text>
  </g>

  <!-- ================= RIGHT: EXTERNAL BAA (dashed) ================= -->
  <rect x="1030" y="330" width="320" height="196" rx="14" fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1050" y="357" font-size="13" fill="#64748B" letter-spacing="1" font-weight="600">EXTERNAL SERVICES — BAA ENVELOPE</text>

  <!-- OCR service (LLM purple) -->
  <rect x="1050" y="372" width="280" height="56" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1066" y="405" font-size="15" font-weight="600" fill="#5B21B6">OCR service</text>

  <!-- Claude (LLM purple) -->
  <rect x="1050" y="444" width="280" height="62" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1066" y="469" font-size="15" font-weight="600" fill="#5B21B6">Claude</text>
  <text x="1066" y="489" font-size="12" fill="#475569">Opus / Sonnet / Haiku</text>

  <!-- ================= BOTTOM: DELIVERABLE (rose) ================= -->
  <rect x="512" y="648" width="400" height="66" rx="10" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
  <text x="528" y="674" font-size="15" font-weight="600" fill="#9F1239">Demand package</text>
  <text x="528" y="694" font-size="12" fill="#475569">letter.docx + exhibit binder.pdf</text>

  <!-- ================= ARROWS ================= -->
  <!-- Case file -> Next.js (from stack top-right, elbow up to FE left) -->
  <path d="M344 400 H408 V193 H472" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Paralegal -> Next.js -->
  <path d="M346 212 H420 V186 H472" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Attorney -> Next.js -->
  <path d="M346 289 H432 V200 H472" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Next.js <-> FastAPI (two offset one-way arrows) -->
  <path d="M700 224 V240" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M724 240 V224" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- FastAPI -> Orchestrator -->
  <path d="M712 302 V318" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Orchestrator -> Document workers -->
  <path d="M589 370 V386" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Orchestrator -> Deterministic core -->
  <path d="M835 370 V380" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FastAPI <-> Postgres (two-headed): down left edge inside container -->
  <path d="M496 302 V512" fill="none" stroke="#334155" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <!-- Document workers <-> Object store (two-headed) -->
  <path d="M660 448 V478 H832 V499" fill="none" stroke="#334155" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Deterministic core -> Demand package (down the channel between cylinders) -->
  <path d="M760 456 V500 H709 V622 H712 V648" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Document workers -> OCR service (right out of container, up to OCR) -->
  <path d="M706 405 H1000 V400 H1050" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Orchestrator -> Claude (right edge to Claude) -->
  <path d="M952 344 H1010 V470 H1050" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Document workers -> Claude -->
  <path d="M706 428 H988 V481 H1050" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
