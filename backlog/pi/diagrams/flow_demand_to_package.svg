<line x1="1160" y1="702" x2="408" y2="702" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="600" y="702" width="360" height="14" fill="#FFFFFF" opacity="0.92"/>
<text x="604" y="713" font-size="11.5" fill="#475569">15  findings (mechanical | semantic buckets) → SSE gate_ready {compliance_review}</text>
</g>

<!-- ============================ G3 DISPOSITION (dual-bucket note) ============================ -->
<rect x="368" y="726" width="720" height="82" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.3"/>
<path d="M368 726 L368 750 L546 750 L546 740 L536 726 Z" fill="#FEF3C7" stroke="#D97706" stroke-width="1.3"/>
<text x="380" y="744" font-size="12" font-weight="600" fill="#92400E">loop — per G3 finding (attorney dispositions)</text>
<g font-size="11.5" fill="#92400E">
<text x="384" y="768" font-weight="600">mechanical →</text>
<text x="480" y="768" fill="#475569">span-patch: deterministic splice + re-verify (no LLM)</text>
<text x="384" y="788" font-weight="600">semantic →</text>
<text x="480" y="788" fill="#475569">regen section (finding appended) → re-validate (11) → re-check (14)</text>
</g>

<!-- ============================ APPROVE + HARD BLOCKS + BUILD ============================ -->
<g>
<!-- 16 AT -> API approve -->
<line x1="100" y1="836" x2="392" y2="836" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="104" y="818" width="300" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="106" y="830" font-size="12" fill="#475569">16  POST /gates/compliance_review/submit {approve}</text>

<!-- 17 OR -> PKG build (guarded by hard blocks) -->
<line x1="406" y1="864" x2="1312" y2="864" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="846" width="620" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="412" y="858" font-size="12" fill="#475569">17  HARD BLOCKS clear (orphans? version mismatch? unverified? undispositioned adverse?) → build</text>
<!-- 18 PKG --> API artifact_ready + package_ready -->
<line x1="1314" y1="890" x2="258" y2="890" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="600" y="884" width="620" height="14" fill="#FFFFFF" opacity="0.92"/>
<text x="604" y="895" font-size="11.5" fill="#475569">18  letter.docx + binder(Bates) + chronology.xlsx + provenance(E4) + SHA-256 manifest → package_ready</text>
</g>
</svg>
