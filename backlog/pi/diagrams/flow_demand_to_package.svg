<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 940" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="fd-title fd-desc">
<title id="fd-title">PI Agent — Demand Generation to Package (G2.5 → G3 → package_ready)</title>
<desc id="fd-desc">UML sequence across nine lifelines — Attorney, FastAPI, Orchestrator, jurisdiction_rules, brain2_drafting, validator, fact_registry/renderer, compliance judge, and package_builder. Entry to plan_review emits a StrategyPlan; attorney approval binds the registry version; demand generation runs a strategy memo then a per-section loop (draft tokens-only, validate with one retry, render, SSE preview); a judge pre-check opens G3, where mechanical findings span-patch and semantic findings regenerate; approval clears hard blocks and the package builder assembles letter, binder, spreadsheet, and provenance report.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
</marker>
</defs>

<rect x="0" y="0" width="1400" height="940" fill="#FFFFFF"/>
<rect x="4" y="4" width="1392" height="932" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

<text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Demand Generation to Package (G2.5 → G3 → package_ready)</text>
<text x="36" y="76" font-size="13" fill="#64748B">Plan emit + approve binds the registry version; per-section draft loop; judge pre-check; G3; build.</text>

