<line x1="700" y1="430" x2="408" y2="430" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="600" y="430" width="80" height="14" fill="#FFFFFF" opacity="0.92"/>
<text x="604" y="441" font-size="11.5" fill="#475569">8  memo</text>
</g>

