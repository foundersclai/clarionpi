<line x1="700" y1="508" x2="408" y2="508" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="470" y="508" width="150" height="14" fill="#FFFBEB"/>
<text x="474" y="519" font-size="11" fill="#475569">10  tokenized section</text>

<!-- 11 OR -> VAL validate -->
<line x1="406" y1="548" x2="842" y2="548" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="530" width="420" height="16" fill="#FFFBEB"/>
<text x="412" y="542" font-size="11.5" fill="#475569">11  validate: tokens resolve @pinned · required present · constraints hold</text>
<!-- alt violation: one retry (inline note) -->
<rect x="410" y="560" width="430" height="16" fill="#FFF7ED"/>
<text x="412" y="572" font-size="11" font-style="italic" fill="#92400E">alt violation → ONE retry to Brain-2 (violation appended); exhaust → error</text>

<!-- 12 OR -> REG render (detokenize) -->
<line x1="406" y1="602" x2="992" y2="602" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="584" width="330" height="16" fill="#FFFBEB"/>
<text x="412" y="596" font-size="11.5" fill="#475569">12  render section (detokenize; tokens NEVER on wire)</text>

<!-- 13 OR --> API SSE section -->
<line x1="394" y1="626" x2="258" y2="626" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="262" y="620" width="0" height="0"/>
<text x="262" y="622" font-size="11" fill="#475569">13  SSE section {rendered_preview}</text>
</g>

<!-- ============================ JUDGE PRE-CHECK ============================ -->
<g>
<!-- 14 OR -> J semantic pre-check -->
<line x1="406" y1="676" x2="1152" y2="676" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="658" width="420" height="16" fill="#FFFFFF" opacity="0.92"/>
