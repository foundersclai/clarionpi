<!-- ============================ MESSAGES: PLAN EMIT ============================ -->
<g>
<!-- 1 OR -> RULES section skeleton -->
<line x1="406" y1="204" x2="543" y2="204" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="186" width="240" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="412" y="198" font-size="12" fill="#475569">1  entry plan_review: section skeleton</text>

<!-- 2 OR -> B2 synthesize emphasis -->
<line x1="406" y1="236" x2="692" y2="236" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="218" width="330" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="412" y="230" font-size="12" fill="#475569">2  synthesize emphasis from G1.5 StrategyInputs</text>
<!-- 3 B2 --> OR StrategyPlan -->
<line x1="700" y1="266" x2="408" y2="266" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="412" y="248" width="470" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="414" y="260" font-size="12" fill="#475569">3  StrategyPlan {sections[section_id, tokens, max_words], demand_amount}</text>

<!-- gate_ready plan_review -->
<line x1="394" y1="290" x2="258" y2="290" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
<rect x="150" y="290" width="0" height="0"/>
<text x="262" y="286" font-size="11.5" fill="#475569">SSE gate_ready {gate: plan_review}</text>

<!-- 4 AT -> API G2.5 approve -->
<line x1="100" y1="322" x2="392" y2="322" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="104" y="304" width="290" height="16" fill="#FFFFFF" opacity="0.92"/>
<text x="106" y="316" font-size="12" fill="#475569">4  POST /gates/plan_review/submit {approve, edits}</text>

<!-- 5 OR self bind registry_version -->
<path d="M406 350 L476 350 L476 362 L408 362" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="484" y="342" width="360" height="16" fill="#FFFFFF" opacity="0.92"/>
