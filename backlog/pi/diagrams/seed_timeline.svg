<line x1="1118.33" y1="112" x2="1118.33" y2="460"/>
<line x1="1166.67" y1="112" x2="1166.67" y2="460"/>
<line x1="1215" y1="112" x2="1215" y2="460"/>
<line x1="1263.33" y1="112" x2="1263.33" y2="460"/>
<line x1="1311.67" y1="112" x2="1311.67" y2="460"/>
<line x1="1360" y1="112" x2="1360" y2="460"/>
</g>
<!-- month labels every 2nd month, centered in the month cell -->
<g font-size="11" fill="#94A3B8" text-anchor="middle">
<text x="224.2" y="106">M1</text>
<text x="320.8" y="106">M3</text>
<text x="417.5" y="106">M5</text>
<text x="514.2" y="106">M7</text>
<text x="610.8" y="106">M9</text>
