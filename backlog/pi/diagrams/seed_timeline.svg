<text x="36" y="594" font-size="12" fill="#94A3B8">Trough cash need ~$1.3–1.4M around mo 18–20 —</text>
<text x="36" y="612" font-size="12" fill="#94A3B8">the $2.5M ask covers it with buffer.</text>

