<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">PI Agent — Seed to Series A (24 months)</title>
<desc id="d">A gantt-style timeline over 24 months with three parallel tracks. Legal and firm track (amber): ethics counsel and structure months 1 to 2, ABS application to license months 3 to 6, AZ attorney search and hire months 1 to 3, with milestone diamonds for first cases signed at month 7 and first fee collections at month 13.5. Software track (purple): corpus, extraction and money engine months 1 to 2.5, gates, Brain-2 and package months 2.5 to 4.5, provenance and evals AZ-tuned months 4.5 to 5.5. Growth track (blue): intake ramp to 12 per month months 7 to 12, scale to 25 per month plus dual-track licensing months 12 to 22, with a Series A raise milestone at month 21. A green annotation strip marks fee collections ramping to about 140K per month from months 13 to 24.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="1400" height="640" fill="#FFFFFF"/>
<rect x="4" y="4" width="1392" height="632" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

<text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Seed to Series A (24 months)</text>
<text x="36" y="76" font-size="13" fill="#64748B">Three parallel tracks — software is fast; the firm and its case pipeline set the clock.</text>

<!-- ============ MONTH GRIDLINES (plot x=200..1360, 24 mo, 48.333px/mo) ============ -->
<g stroke="#E2E8F0" stroke-width="1">
