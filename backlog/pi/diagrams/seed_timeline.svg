<rect x="296.67" y="184" width="145" height="22" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="449" y="200" font-size="12.5" fill="#92400E">ABS application → license</text>

<!-- row 3: AZ attorney search + hire mo 1-3 -->
<rect x="200" y="214" width="96.67" height="22" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="304" y="230" font-size="12.5" fill="#92400E">AZ attorney search + hire</text>

