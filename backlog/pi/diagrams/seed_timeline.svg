<text x="1190.8" y="106">M21</text>
<text x="1287.5" y="106">M23</text>
</g>

<!-- separator under month axis -->
<line x1="36" y1="120" x2="1360" y2="120" stroke="#E2E8F0" stroke-width="1.5"/>

<!-- ============ LANE: LEGAL + FIRM (amber, y 124..276, 3 bar rows + milestone row) ============ -->
<rect x="36" y="124" width="1324" height="152" rx="8" fill="#FFFBEB"/>
<text x="52" y="146" font-size="13" fill="#64748B" letter-spacing="1">LEGAL + FIRM</text>

<!-- row 1: Ethics counsel + structure mo 1-2 -->
<rect x="200" y="154" width="48.33" height="22" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="256" y="170" font-size="12.5" fill="#92400E">M-1 Ethics counsel + structure</text>

