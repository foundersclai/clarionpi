<path d="M490 252 l8 -8 l8 8 l-8 8 z" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="506" y="256" font-size="12" fill="#92400E">First cases signed</text>
<path d="M804.17 252 l8 -8 l8 8 l-8 8 z" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="820" y="256" font-size="12" fill="#92400E">First fee collections</text>

<!-- ============ LANE: SOFTWARE (purple, y 280..344, 1 row + labels) ============ -->
<rect x="36" y="280" width="1324" height="64" rx="8" fill="#FFFFFF"/>
<text x="52" y="316" font-size="13" fill="#64748B" letter-spacing="1">SOFTWARE</text>

<!-- M0-M2 Corpus + extraction + money engine mo 1-2.5 -->
<rect x="200" y="299" width="72.5" height="26" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<!-- M3-M5 Gates + Brain-2 + package mo 2.5-4.5 -->
<rect x="272.5" y="299" width="96.67" height="26" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<!-- M6-M7 Provenance + evals, AZ-tuned mo 4.5-5.5 -->
<rect x="369.17" y="299" width="48.33" height="26" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<!-- labels to the right of the software block -->
<text x="430" y="309" font-size="12" fill="#5B21B6">M0–M2 Corpus + extraction + money engine  ·  M3–M5 Gates + Brain-2 + package</text>
<text x="430" y="324" font-size="12" fill="#5B21B6">M6–M7 Provenance + evals, AZ-tuned  (mo 1–5.5)</text>

<!-- ============ LANE: GROWTH (blue, y 348..412, bars + Series A milestone) ============ -->
<rect x="36" y="348" width="1324" height="64" rx="8" fill="#FFFFFF"/>
<text x="52" y="384" font-size="13" fill="#64748B" letter-spacing="1">GROWTH</text>

<!-- Intake ramp to 12/mo mo 7-12 -->
<rect x="490" y="367" width="241.67" height="26" rx="5" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="611" y="384" font-size="12.5" font-weight="600" fill="#075985" text-anchor="middle">Intake ramp to 12/mo</text>
<!-- Scale to 25/mo + dual-track licensing mo 12-22 -->
<rect x="731.67" y="367" width="483.33" height="26" rx="5" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="973" y="384" font-size="12.5" font-weight="600" fill="#075985" text-anchor="middle">Scale to 25/mo + dual-track licensing</text>
<!-- Series A raise milestone mo 21 (diamond sits above the mo-21 gridline, label to its left) -->
<path d="M1166.67 372 l8 -8 l8 8 l-8 8 z" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<rect x="1075" y="343" width="86" height="16" fill="#FFFFFF"/>
<text x="1158" y="356" font-size="12" font-weight="600" fill="#075985" text-anchor="end">Series A raise</text>
<line x1="1174.67" y1="358" x2="1174.67" y2="366" stroke="#0284C7" stroke-width="1.5"/>

<!-- ============ GREEN ANNOTATION STRIP: fee collections ramp mo 13-24 (own sub-lane) ============ -->
<rect x="36" y="416" width="1324" height="44" rx="8" fill="#F0FDF4"/>
<text x="52" y="442" font-size="13" fill="#64748B" letter-spacing="1">FEES</text>
<rect x="780" y="431" width="531.67" height="14" rx="4" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="773" y="442" font-size="12" fill="#166534" text-anchor="end">Fee collections ramp to ~$140K/mo&#160;</text>

<!-- ============ LEGEND (bottom) ============ -->
<g>
<rect x="700" y="586" width="14" height="14" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
