<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">PI Agent — Bootstrap Flywheel &amp; Five-Year Ramp</title>
<desc id="d">Left half: a five-node flywheel. Founder float of about 300 to 450 thousand dollars feeds in from outside and primes the cycle. The cycle runs Signed cases (amber), to Demands out in days via software (purple), to Fee collections with a roughly seven-month lag (green), to Reinvest in intake (blue), and back to Signed cases. A caption notes that cutting the lag to 5.5 months spins the wheel about 25 percent faster. Right half: five revenue bars for Years 1 through 5 at 0.05, 0.65, 1.55, 3.0 and 4.5 million dollars in blue, each with a green EBITDA marker at 0, about 0, 0.6, 1.2 and 1.9 million. A dashed ceiling line at 5 million marks the bootstrap ceiling zone, annotated as a plateau around 5 to 7 million per year without brand spend.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="1400" height="620" fill="#FFFFFF"/>
<rect x="4" y="4" width="1392" height="612" rx="14" fill="none" stroke="#E2E8F0" stroke-width="1.5"/>

<text x="36" y="52" font-size="22" font-weight="bold" fill="#0F172A">PI Agent — Bootstrap Flywheel &amp; Five-Year Ramp</text>
<text x="36" y="76" font-size="13" fill="#64748B">Founder float primes the pump; collections fund the next round of cases.</text>

<!-- divider between the two halves -->
<line x1="640" y1="108" x2="640" y2="560" stroke="#E2E8F0" stroke-width="1.5"/>

<!-- ================= LEFT HALF: FLYWHEEL (x ~40..620) ================= -->
<text x="52" y="128" font-size="13" fill="#64748B" letter-spacing="1">THE FLYWHEEL</text>

<!-- Founder float (neutral, dashed, feeds in from outside top-left) -->
<g>
<rect x="52" y="146" width="220" height="60" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="162" y="172" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">Founder float</text>
<text x="162" y="191" font-size="12" fill="#475569" text-anchor="middle">~$300–450K · primes the pump</text>
</g>

<!-- Signed cases (amber) top-right of cycle -->
<g>
<rect x="378" y="176" width="204" height="60" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="480" y="202" font-size="15" font-weight="600" fill="#92400E" text-anchor="middle">Signed cases</text>
<text x="480" y="221" font-size="12" fill="#475569" text-anchor="middle">paid + attorney referrals</text>
</g>

<!-- Demands out — software (purple) right side -->
<g>
<rect x="420" y="286" width="196" height="60" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<text x="518" y="312" font-size="15" font-weight="600" fill="#5B21B6" text-anchor="middle">Demands out in days</text>
<text x="518" y="331" font-size="12" fill="#475569" text-anchor="middle">the software</text>
</g>

<!-- Fee collections (green) bottom -->
<g>
<rect x="240" y="396" width="204" height="60" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="342" y="422" font-size="15" font-weight="600" fill="#166534" text-anchor="middle">Fee collections</text>
<text x="342" y="441" font-size="12" fill="#475569" text-anchor="middle">~7-month lag</text>
</g>

<!-- Reinvest in intake (blue) left side -->
<g>
<rect x="52" y="286" width="196" height="60" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="150" y="312" font-size="15" font-weight="600" fill="#075985" text-anchor="middle">Reinvest in intake</text>
<text x="150" y="331" font-size="12" fill="#475569" text-anchor="middle">marketing + referrals</text>
</g>

<!-- Founder float -> Signed cases (dashed feed-in) -->
<path d="M272 182 L330 182 L330 196 L374 196" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

<!-- Signed cases -> Demands out (curve down the right) -->
<path d="M498 236 Q540 260 526 282" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Demands out -> Fee collections (curve to bottom, lag label) -->
<path d="M470 346 Q430 384 400 392" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="384" y="360" width="118" height="18" rx="4" fill="#FFFFFF"/>
<text x="443" y="373" font-size="12" fill="#475569" text-anchor="middle">collect (~7-mo lag)</text>

<!-- Fee collections -> Reinvest (curve up the left) -->
<path d="M280 396 Q200 372 176 350" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Reinvest -> Signed cases (curve across the top) -->
<path d="M180 286 Q220 246 374 216" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="236" y="250" width="132" height="18" rx="4" fill="#FFFFFF"/>
<text x="302" y="263" font-size="12" fill="#475569" text-anchor="middle">fund the next cases</text>

<!-- caption under the cycle -->
<text x="52" y="500" font-size="12" fill="#94A3B8">Cut the lag to 5.5 mo and the wheel spins ~25% faster.</text>

<!-- ================= RIGHT HALF: FIVE-YEAR RAMP (x ~660..1360) ================= -->
<text x="700" y="118" font-size="13" fill="#64748B" letter-spacing="1">FIVE-YEAR RAMP</text>

<!-- Y-axis gridlines at $1M steps to $5M. baseline y=500 ($0), 74px per $1M -->
<g stroke="#E2E8F0" stroke-width="1">
<line x1="720" y1="500" x2="1360" y2="500"/>
<line x1="720" y1="426" x2="1360" y2="426"/>
<line x1="720" y1="352" x2="1360" y2="352"/>
<line x1="720" y1="278" x2="1360" y2="278"/>
<line x1="720" y1="204" x2="1360" y2="204"/>
</g>
<!-- $5M gridline is drawn as the dashed ceiling below -->
<g font-size="11" fill="#94A3B8" text-anchor="end">
<text x="712" y="504">$0</text>
<text x="712" y="430">$1M</text>
<text x="712" y="356">$2M</text>
<text x="712" y="282">$3M</text>
<text x="712" y="208">$4M</text>
<text x="712" y="134">$5M</text>
</g>

<!-- dashed ceiling line at $5M (y=130) -->
<line x1="720" y1="130" x2="1360" y2="130" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="1356" y="122" font-size="12" fill="#94A3B8" text-anchor="end">bootstrap ceiling zone</text>

<!-- plateau annotation above Y4-Y5 -->
<text x="1180" y="152" font-size="12" fill="#94A3B8" text-anchor="middle">plateau without brand spend: ~$5–7M/yr</text>

<!-- Bars: Y1..Y5. Bar width 80, centered on x-slots; blue revenue, green EBITDA marker.
     slots centered at 800, 920, 1040, 1160, 1280. baseline y=500. 74px/$1M.
     Revenue heights: 0.05M=3.7 -> use ~4; 0.65M=48; 1.55M=115; 3M=222; 4.5M=333.
     EBITDA overlay heights (from baseline): 0; ~0; 0.6M=44; 1.2M=89; 1.9M=141. -->

<!-- Y1: revenue $0.05M, EBITDA $0 -->
<rect x="760" y="496" width="80" height="4" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="800" y="490" font-size="12" font-weight="600" fill="#075985" text-anchor="middle">$0.05M</text>
<text x="800" y="476" font-size="11" fill="#166534" text-anchor="middle">EBITDA $0</text>

<!-- Y2: revenue $0.65M, EBITDA ~$0 -->
<rect x="880" y="452" width="80" height="48" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="920" y="444" font-size="12" font-weight="600" fill="#075985" text-anchor="middle">$0.65M</text>
<line x1="880" y1="500" x2="960" y2="500" stroke="#16A34A" stroke-width="3"/>
<text x="920" y="516" font-size="11" fill="#166534" text-anchor="middle">EBITDA ~$0</text>

<!-- Y3: revenue $1.55M (top y=385), EBITDA $0.6M overlay (top y=456) -->
<rect x="1000" y="385" width="80" height="115" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<rect x="1000" y="456" width="80" height="44" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="1040" y="377" font-size="12" font-weight="600" fill="#075985" text-anchor="middle">$1.55M</text>
<text x="1040" y="482" font-size="11" fill="#166534" text-anchor="middle">$0.6M</text>

<!-- Y4: revenue $3.0M (top y=278), EBITDA $1.2M overlay (top y=411) -->
<rect x="1120" y="278" width="80" height="222" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<rect x="1120" y="411" width="80" height="89" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="1160" y="270" font-size="12" font-weight="600" fill="#075985" text-anchor="middle">$3M</text>
<text x="1160" y="460" font-size="11" fill="#166534" text-anchor="middle">$1.2M</text>

<!-- Y5: revenue $4.5M (top y=167), EBITDA $1.9M overlay (top y=359) -->
<rect x="1240" y="167" width="80" height="333" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<rect x="1240" y="359" width="80" height="141" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="1280" y="159" font-size="12" font-weight="600" fill="#075985" text-anchor="middle">$4.5M</text>
<text x="1280" y="440" font-size="11" fill="#166534" text-anchor="middle">$1.9M</text>

<!-- X-axis baseline + labels -->
<line x1="720" y1="500" x2="1360" y2="500" stroke="#94A3B8" stroke-width="1.5"/>
<g font-size="12" fill="#475569" text-anchor="middle">
<text x="800" y="536">Y1</text>
<text x="920" y="536">Y2</text>
<text x="1040" y="536">Y3</text>
<text x="1160" y="536">Y4</text>
<text x="1280" y="536">Y5</text>
</g>

<!-- ================= LEGEND (bottom) ================= -->
<g>
<rect x="360" y="588" width="14" height="14" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="380" y="600" font-size="11.5" fill="#475569">cases</text>
<rect x="440" y="588" width="14" height="14" rx="3" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
<text x="460" y="600" font-size="11.5" fill="#475569">software stage</text>
<rect x="562" y="588" width="14" height="14" rx="3" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
<text x="582" y="600" font-size="11.5" fill="#475569">collections / EBITDA</text>
<rect x="720" y="588" width="14" height="14" rx="3" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5"/>
<text x="740" y="600" font-size="11.5" fill="#475569">reinvestment / revenue</text>
<rect x="892" y="588" width="14" height="14" rx="3" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="912" y="600" font-size="11.5" fill="#475569">founder float / ceiling</text>
</g>

</svg>
