# Arizona rule pack (v1 = AZ only).
#
# STATUS: UNAUDITED STUB. `audited: false` and every rule's `verify_status: unverified` —
# the statute cites carry an explicit "(verify — counsel)" marker and the assumptions are
# surfaced, never hidden. These are computation *candidates* for attorney confirmation at G1
# (invariant 4); nothing here is a confirmed deadline. A legal cofounder audit replaces the
# markers and flips the flags before this pack is treated as authoritative.
pack: AZ
version: 0.1.0
audited: false
# Counsel-audit provenance — REQUIRED (non-null; audited_at timezone-aware) the moment
# `audited` flips to true. Filled by the legal-audit PR after counsel review; see
# docs/audit/rule-pack-audit-checklist.md.
audited_by: null
audited_at: null
audit_reference: null
audit_notes: null

deadline_rules:
  - kind: sol
    claim_type: mva
    years: 2
    statute_cite: "A.R.S. § 12-542 (verify — counsel)"
    assumptions:
      - "adult plaintiff — no tolling"
      - "date of accrual = incident date"
    verify_status: unverified

  - kind: notice_of_claim
    applies_when: "defendant may be a public entity"
    days: 180
    statute_cite: "A.R.S. § 12-821.01 (verify — counsel)"
    assumptions:
      - "public-entity defendant — confirm at G1"
    verify_status: unverified

# Specials-ledger demand basis (money_engine): whether the demand leads with billed charges or
# amounts actually paid. AZ v1 = billed; the source is a computation candidate for counsel audit,
# not confirmed law (the "(verify — counsel)" marker and unverified status say so).
billed_vs_paid:
  basis: billed
  source: "Lopez v. Safeway Stores, Inc., 212 Ariz. 198, 129 P.3d 487 (App. 2006) (verify — counsel)"
  verify_status: unverified

# Demand-letter section skeleton (Brain-2 drafting): the ordered sections of the demand letter,
# each with a purpose, a soft word ceiling, and the fact-token kinds it must carry. The SECTION
# LIST is a legal-drafting judgment (the shape of a persuasive PI demand), so the whole block is
# UNVERIFIED — a legal cofounder confirms the section set, order, and word ceilings before it is
# authoritative. Drafting REQUIRES this skeleton; there is no code-side default (the loader raises
# LetterStructureMissing when a pack omits it).
letter_structure:
  source: "ClarionPI drafting standard v1 (verify — legal cofounder)"
  verify_status: unverified
  sections:
    - section_id: intro_and_representation
      purpose: "Introduce representation, the claim, and the demand posture."
      max_words: 250
      required_token_kinds: []
    - section_id: liability
      purpose: "Establish fault from the incident facts."
      max_words: 450
      required_token_kinds: [fact]
    - section_id: injuries_and_treatment
      purpose: "Narrate injuries and the treatment chronology."
      max_words: 700
      required_token_kinds: [fact]
    - section_id: damages_and_specials
      purpose: "Present special damages from the ledger."
      max_words: 450
      required_token_kinds: [amount]
    - section_id: demand_and_deadline
      purpose: "State the demand amount and response terms."
      max_words: 300
      required_token_kinds: [amount]
